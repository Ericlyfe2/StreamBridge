version: "3.9"
services:
  streambridge:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      - STREAMBRIDGE_SIGNING_SECRET=local-dev-secret
    ports:
      - "8000:8000"
    command: >
      sh -c "pip install -r requirements.txt &&
             python run.py"
